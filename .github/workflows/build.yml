name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Clean and Assemble APKs
      env:
        GRADLE_OPTS: "-Xmx6144m -Dorg.gradle.daemon=false -Dkotlin.compiler.execution.strategy=in-process"
      run: ./gradlew clean assembleDebug assembleRelease --stacktrace --no-build-cache

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DjoudinisIPTV-Debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: DjoudinisIPTV-Release-Unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk
